<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Call Your Mechanic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<th:block th:fragment="publicHeader(eyebrow, title, subtitle)">
    <header class="hero-panel">
        <div class="brand-mark">CYM</div>
        <p class="eyebrow" th:text="${eyebrow}">Roadside help</p>
        <h1 th:text="${title}">Call Your Mechanic</h1>
        <p class="hero-copy" th:text="${subtitle}">Roadside rescue for vehicles in minutes.</p>
    </header>
</th:block>

<th:block th:fragment="userNav(active)">
    <nav class="bottom-nav">
        <a th:href="@{/app/user/home}" th:classappend="${active == 'home'} ? ' active'">Home</a>
        <a th:href="@{/app/user/tracking}" th:classappend="${active == 'tracking'} ? ' active'">Bookings</a>
        <a th:href="@{/app/user/vehicles}" th:classappend="${active == 'vehicles'} ? ' active'">Vehicles</a>
        <a th:href="@{/app/user/profile}" th:classappend="${active == 'profile'} ? ' active'">Profile</a>
    </nav>
</th:block>

<th:block th:fragment="mechanicNav(active)">
    <nav class="bottom-nav">
        <a th:href="@{/app/mechanic/dashboard}" th:classappend="${active == 'dashboard'} ? ' active'">Home</a>
        <a th:href="@{/app/mechanic/requests}" th:classappend="${active == 'requests'} ? ' active'">Requests</a>
        <a th:href="@{/app/mechanic/job}" th:classappend="${active == 'job'} ? ' active'">Job</a>
        <a th:href="@{/app/mechanic/earnings}" th:classappend="${active == 'earnings'} ? ' active'">Earnings</a>
        <a th:href="@{/app/mechanic/profile}" th:classappend="${active == 'profile'} ? ' active'">Profile</a>
    </nav>
</th:block>

<th:block th:fragment="toastHost">
    <div id="toast-region" class="toast-region" aria-live="polite"></div>
</th:block>

<th:block th:fragment="appScript">
    <script type="module" th:src="@{/js/app.js}"></script>
</th:block>
</body>
</html>
