<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${pageTitle})}"></head>
<body th:attr="data-page=${pageName},data-role-scope=${pageRole}">
<main class="page-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Requests</p>
            <h1>Incoming Requests</h1>
        </div>
        <a class="btn btn-muted" th:href="@{/app/mechanic/dashboard}">Dashboard</a>
    </header>
    <section id="mechanic-request-list" class="request-list" data-fatal-target></section>
</main>
<div th:replace="~{fragments/common :: mechanicNav('requests')}"></div>
<div th:replace="~{fragments/common :: toastHost}"></div>
<div th:replace="~{fragments/common :: appScript}"></div>
</body>
</html>
