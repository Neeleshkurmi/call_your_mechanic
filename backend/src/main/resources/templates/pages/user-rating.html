<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/common :: head(${pageTitle})}"></head>
<body th:attr="data-page=${pageName},data-role-scope=${pageRole},data-booking-id=${bookingId}">
<main class="page-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">Feedback</p>
            <h1>Rate Your Mechanic</h1>
        </div>
        <a class="btn btn-muted" th:href="@{/app/user/home}">Home</a>
    </header>
    <div id="rating-banner" class="banner"></div>
    <section class="panel">
        <div class="grid two">
            <article class="card">
                <h3>Mechanic</h3>
                <p id="rating-mechanic-name" class="service-name">Loading...</p>
                <p id="rating-booking-fare" class="muted">Fetching fare...</p>
            </article>
            <article class="card">
                <h3>Booking</h3>
                <p id="rating-booking-id" class="service-name">Loading...</p>
                <p id="rating-service-name" class="muted">Fetching service...</p>
            </article>
        </div>
        <form id="rating-form">
            <div class="field">
                <label for="rating-score">Your Rating</label>
                <select id="rating-score" name="rating" required>
                    <option value="">Select rating</option>
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Good</option>
                    <option value="3">3 - Okay</option>
                    <option value="2">2 - Poor</option>
                    <option value="1">1 - Very Bad</option>
                </select>
            </div>
            <div class="field">
                <label for="rating-review">Review</label>
                <textarea id="rating-review" name="review" maxlength="1000" placeholder="Tell us about the mechanic's arrival, behavior, and service quality."></textarea>
            </div>
            <div class="button-row">
                <button id="submit-rating-button" class="btn btn-primary" type="submit">Submit Rating</button>
            </div>
        </form>
    </section>
</main>
<div th:replace="~{fragments/common :: userNav('tracking')}"></div>
<div th:replace="~{fragments/common :: toastHost}"></div>
<div th:replace="~{fragments/common :: appScript}"></div>
</body>
</html>
