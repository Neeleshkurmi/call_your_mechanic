server:
  address: 0.0.0.0
  port: ${PORT:8080}

spring:
  application:
    name: call-your-mechanic
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:call-your-mechanic}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: ${JPA_SHOW_SQL:false}

  sql:
    init:
      mode: ${SQL_INIT_MODE:never}
  devtools:
    add-properties: false


  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

springdoc:
  api-docs:
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:true}
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true


app:
  auth:
    otp-expiry-seconds: 300
    otp-resend-cooldown-seconds: 60
    otp-max-attempts: 5
    mock-sms-enabled: ${APP_AUTH_MOCK_SMS_ENABLED:false}
    fixed-otp: ${APP_AUTH_FIXED_OTP:}

# SMS provider
sms:
  accountSid: ${SMS_ACCOUNTSID:}
  authToken: ${SMS_AUTHTOKEN:}
  fromNumber: ${SMS_FROMNUMBER:}


security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:local-dev-only-change-this-secret-key-32chars}
    access-token-ttl: ${SECURITY_JWT_ACCESS_TOKEN_TTL:PT2H}
    refresh-token-ttl: ${SECURITY_JWT_REFRESH_TOKEN_TTL:P30D}
